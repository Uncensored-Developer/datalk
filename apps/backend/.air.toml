root = "."
tmp_file = "tmp"

[build]
full_bin = "make run"
cmd = "make"
delay = 1000
exclude_dir = ["assets", "vendor", "cmd", "keys", "generated", "etc"]
exclude_file = []
exclude_regex = ["_test.go"]
exclude_unchanged = false
follow_symlink = false
include_dir = []
include_ext = ["go", "html", "js", "css"]
kill_delay = "0s"
log = "build-errors.log"
send_interrupt = true
stop_on_error = true

[color]
app = ""
build = "yellow"
main = "magenta"
runner = "green"
watcher = "cyan"

[log]
time = true

[misc]
clean_on_exit = true

[screen]
clear_on_rebuild = false
